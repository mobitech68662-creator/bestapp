version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bestapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bestapp
      POSTGRES_PASSWORD: bestapp_secret_2024
      POSTGRES_DB: bestapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bestapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: bestapp-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bestapp:bestapp_secret_2024@postgres:5432/bestapp
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: bestapp-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
